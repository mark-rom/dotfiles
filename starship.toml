# Use a custom format: username, hostname, directory, git, venv, then prompt char
format = """
$username$hostname$directory$git_branch$git_state$python$character
"""

# Make hostname short (no domain)
[hostname]
ssh_only = false
format = "[@$hostname]($style): "
style = "blue" 

# Show username always
[username]
show_always = true
style_user = "bold bright-blue"
format = "[$user]($style)"

# Current folder
[directory]
truncation_length = 3
style = "bold white"
format = "[$path]($style) "

# Git branch
[git_branch]
format = "[$symbol$branch]($style) "
symbol = "on  "
style = "bold yellow"

# Git state (rebase/merge/etc.)
[git_state]
format = " [$state( $progress_current/$progress_total)]($style) "
style = "bold red"

# Python venv
[python]
format = "[($virtualenv)]($style) "
style = "bold cyan"
pyenv_version_name = false
python_binary = ["python", "python3"]

# Keep the default success/error symbols
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

